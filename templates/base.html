{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ProjectFlow{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body>

{% if messages %}
<div class="toast-container">
  {% for message in messages %}
  <div class="toast toast-{{ message.tags }} show">
    <i class="fa {% if message.tags == 'success' %}fa-check-circle{% elif message.tags == 'danger' %}fa-exclamation-circle{% elif message.tags == 'warning' %}fa-exclamation-triangle{% else %}fa-info-circle{% endif %}"></i>
    {{ message }}
    <button class="toast-close" onclick="this.parentElement.remove()">×</button>
  </div>
  {% endfor %}
</div>
{% endif %}

{% block body %}{% endblock %}

<script src="{% static 'js/main.js' %}"></script>
{% block extra_js %}{% endblock %}

<script>
// Auto-dismiss toasts
setTimeout(() => {
  document.querySelectorAll('.toast').forEach(t => t.classList.remove('show'));
}, 4000);
</script>
</body>
</html>
